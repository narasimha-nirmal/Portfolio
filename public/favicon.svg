<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B0764"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Subtle top shine -->
  <rect width="32" height="16" rx="8" fill="url(#shine)"/>

  <!-- Geometric N — left bar -->
  <rect x="6.5" y="6" width="3" height="20" rx="1" fill="white"/>
  <!-- N diagonal stroke -->
  <polygon points="6.5,6 10,6 22.5,26 19,26" fill="white"/>
  <!-- Right bar -->
  <rect x="22.5" y="6" width="3" height="20" rx="1" fill="white"/>

  <!-- Accent dot bottom-right -->
  <circle cx="26" cy="26" r="2.5" fill="#A78BFA"/>
</svg>
